function b2a(b){return Uint8Array.from(atob(b),c=>c.charCodeAt(0));}
async function decrypt(pw){
  try{
    const enc=new TextEncoder();
    const base=await crypto.subtle.importKey("raw",enc.encode(pw),"PBKDF2",false,["deriveKey"]);
    const key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:b2a(SALT),iterations:ITERS,hash:"SHA-256"},
      base,{name:"AES-GCM",length:256},false,["decrypt"]);
    const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:b2a(IV)},key,b2a(CT));
    return new TextDecoder().decode(pt);
  }catch(e){return null;}
}
function render(html){document.open();document.write(html);document.close();}
async function unlock(pw,remember){
  const html=await decrypt(pw);
  if(!html){return false;}
  if(remember)sessionStorage.setItem("bk_pw",pw);
  render(html); return true;
}
document.getElementById("f").addEventListener("submit",async e=>{
  e.preventDefault();
  const btn=document.getElementById("btn"),err=document.getElementById("err");
  btn.disabled=true; err.textContent="Verificando...";
  const ok=await unlock(document.getElementById("pw").value,document.getElementById("rem").checked);
  if(!ok){err.textContent="Contrase\u00f1a incorrecta."; btn.disabled=false;}
});
(async()=>{const pw=sessionStorage.getItem("bk_pw"); if(pw){await unlock(pw,true);}})();
